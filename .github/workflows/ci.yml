name: ARR CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: pytest-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Prepare evidence folder
        run: python -c "from pathlib import Path; Path('_codex_runtime/artifacts').mkdir(parents=True, exist_ok=True)"

      - name: Compile Python files
        shell: pwsh
        run: |
          python -m compileall -q conftest.py services tests
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "COMPILEALL_OK" | Set-Content "_codex_runtime/artifacts/compileall-${{ matrix.os }}.txt"

      - name: Check panel.js syntax
        shell: pwsh
        run: |
          node --check services/media-panel/media_panel/web/static/js/panel.js
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "NODE_CHECK_OK" | Set-Content "_codex_runtime/artifacts/node-check-${{ matrix.os }}.txt"

      - name: Run pytest
        run: python -m pytest -q --junitxml _codex_runtime/artifacts/pytest-junit-${{ matrix.os }}.xml --durations=20

      - name: Write review summary
        if: always()
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY "## ARR CI"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "- Commit: $env:GITHUB_SHA"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Ref: $env:GITHUB_REF"
          Add-Content $env:GITHUB_STEP_SUMMARY '- Platform: `${{ matrix.os }}`'
          Add-Content $env:GITHUB_STEP_SUMMARY '- Evidence: artifact `arr-pytest-evidence-${{ matrix.os }}`'

          $junitPath = "_codex_runtime/artifacts/pytest-junit-${{ matrix.os }}.xml"
          if (Test-Path $junitPath) {
            [xml]$junit = Get-Content $junitPath
            $suites = @()
            if ($junit.testsuites.testsuite) {
              $suites = @($junit.testsuites.testsuite)
            } elseif ($junit.testsuite) {
              $suites = @($junit.testsuite)
            }

            $tests = 0
            $failures = 0
            $errors = 0
            $skipped = 0
            foreach ($suite in $suites) {
              $tests += [int]$suite.tests
              $failures += [int]$suite.failures
              $errors += [int]$suite.errors
              $skipped += [int]$suite.skipped
            }

            Add-Content $env:GITHUB_STEP_SUMMARY ""
            Add-Content $env:GITHUB_STEP_SUMMARY "### Pytest"
            Add-Content $env:GITHUB_STEP_SUMMARY ""
            Add-Content $env:GITHUB_STEP_SUMMARY "- Tests: $tests"
            Add-Content $env:GITHUB_STEP_SUMMARY "- Failures: $failures"
            Add-Content $env:GITHUB_STEP_SUMMARY "- Errors: $errors"
            Add-Content $env:GITHUB_STEP_SUMMARY "- Skipped: $skipped"
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY ""
            Add-Content $env:GITHUB_STEP_SUMMARY "No pytest JUnit report was generated."
          }

      - name: Upload pytest evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arr-pytest-evidence-${{ matrix.os }}
          path: _codex_runtime/artifacts/
          if-no-files-found: warn
          retention-days: 30
